name: Reusable Cloudflare Deploy

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing the project.
        required: false
        type: string
        default: "."
      node-version:
        description: Node.js version used for build.
        required: false
        type: string
        default: "22"
      package-manager-version:
        description: pnpm version.
        required: false
        type: string
        default: "10.34.4"
      install-command:
        description: Dependency installation command.
        required: false
        type: string
        default: pnpm install --frozen-lockfile
      build-command:
        description: Production build command.
        required: false
        type: string
        default: pnpm build
      deploy-command:
        description: Cloudflare deploy command (e.g. wrangler deploy or wrangler pages deploy dist/).
        required: true
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

permissions:
  contents: read

jobs:
  deploy-cloudflare:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.package-manager-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Build application
        run: ${{ inputs.build-command }}

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ${{ inputs.deploy-command }}
