name: Reusable Container Deploy

on:
  workflow_call:
    inputs:
      image-name:
        description: Full image name including registry path (e.g. registry.digitalocean.com/tarjam/api).
        required: true
        type: string
      image-tag:
        description: Image tag to build and push.
        required: false
        type: string
        default: latest
      dockerfile:
        description: Path to the Dockerfile relative to context.
        required: false
        type: string
        default: Dockerfile
      context:
        description: Docker build context path.
        required: false
        type: string
        default: "."
      registry:
        description: Container registry hostname (e.g. registry.digitalocean.com).
        required: false
        type: string
        default: registry.digitalocean.com
      deploy-command:
        description: Remote deploy command to run over SSH; skipped when empty.
        required: false
        type: string
        default: ""
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_TOKEN:
        required: true
      DEPLOY_SSH_PRIVATE_KEY:
        required: false
      DEPLOY_HOST:
        required: false
      DEPLOY_USER:
        required: false

permissions:
  contents: read

jobs:
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ inputs.image-name }}:${{ inputs.image-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy container
    runs-on: ubuntu-latest
    needs: build-push
    if: inputs.deploy-command != ''
    environment: production

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on remote host
        env:
          IMAGE: ${{ inputs.image-name }}:${{ inputs.image-tag }}
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '${{ inputs.deploy-command }}'
