name: Reusable Container Deploy

on:
  workflow_call:
    inputs:
      tags:
        description: Newline-separated image:tag values to build and push.
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile relative to context.
        required: false
        type: string
        default: Dockerfile
      context:
        description: Docker build context path.
        required: false
        type: string
        default: "."
      registry:
        description: Container registry hostname (used only when use-github-token is false).
        required: false
        type: string
        default: ghcr.io
      use-github-token:
        description: Use GITHUB_TOKEN for GHCR auth. Set false to use REGISTRY_USERNAME/REGISTRY_TOKEN.
        required: false
        type: boolean
        default: true
      deploy-command:
        description: Remote deploy command to run over SSH; skipped when empty.
        required: false
        type: string
        default: ""
    secrets:
      REGISTRY_USERNAME:
        required: false
      REGISTRY_TOKEN:
        required: false
      DEPLOY_SSH_PRIVATE_KEY:
        required: false
      DEPLOY_HOST:
        required: false
      DEPLOY_USER:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: inputs.use-github-token
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to custom registry
        if: ${{ !inputs.use-github-token }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ inputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy container
    runs-on: ubuntu-latest
    needs: build-push
    if: inputs.deploy-command != ''
    environment: production

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on remote host
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '${{ inputs.deploy-command }}'
